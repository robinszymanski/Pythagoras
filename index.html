<!doctype html>
<html lang="en">
  <head>
    <title>Vektorgeometrie Pyramide | XR Blocks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    
    <script>
      window.litDisableBundleWarning = true;
    </script>
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/": "https://cdn.jsdelivr.net/npm/three@0.182.0/",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "@pmndrs/uikit": "https://cdn.jsdelivr.net/npm/@pmndrs/uikit@1.0.56/dist/index.min.js",
          "@pmndrs/uikit-pub-sub": "https://cdn.jsdelivr.net/npm/@pmndrs/uikit-pub-sub@1.0.56/dist/index.min.js",
          "@pmndrs/msdfonts": "https://cdn.jsdelivr.net/npm/@pmndrs/msdfonts@1.0.56/dist/index.min.js",
          "@preact/signals-core": "https://cdn.jsdelivr.net/npm/@preact/signals-core@1.12.1/dist/signals-core.mjs",
          "yoga-layout/load": "https://cdn.jsdelivr.net/npm/yoga-layout@3.2.1/dist/src/load.js",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.16.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.16.0/build/addons/",
          "uiblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.16.0/build/addons/uiblocks/src/index.js"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';
      import * as xb from 'xrblocks';
      import * as uikit from '@pmndrs/uikit';
      import { UICore, UIPanel, UIText, ManipulationBehavior, raycastSortFunction } from 'uiblocks';
      import { Text } from 'troika-three-text';

      class PyramidMathApplet extends xb.Script {
        constructor() {
          super();
          this.uiCore = new UICore(this);
          
          // State-Variablen für das interaktive Lernen
          this.currentTask = 0;
          this.showCoordinates = false;
          this.showHint = false;
          
          // Referenzen für 3D-Objekte
          this.pyramidGroup = new THREE.Group();
          this.labels = [];
          this.taskObjects = new THREE.Group();
          
          // Definition der Eckpunkte der Pyramide (in lokalen Koordinaten)
          this.points = {
            A: new THREE.Vector3(-2, 0, 2),
            B: new THREE.Vector3(2, 0, 2),
            C: new THREE.Vector3(2, 0, -2),
            D: new THREE.Vector3(-2, 0, -2),
            S: new THREE.Vector3(0, 4, 0), // Spitze
            L: new THREE.Vector3(-4, 6, 4) // Lichtquelle für Schatten
          };
        }

        async init() {
          // Raycaster für UI-Interaktionen vorbereiten
          if (xb.core.input.raycaster) {
            xb.core.input.raycaster.sortFunction = raycastSortFunction;
          }

          // Beleuchtung hinzufügen
          this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
          const dirLight = new THREE.DirectionalLight(0xffffff, 1);
          dirLight.position.set(5, 10, 5);
          this.add(dirLight);

          // Pyramide im Raum positionieren
          this.pyramidGroup.position.set(0, 0.8, -1.5);
          this.pyramidGroup.scale.set(0.2, 0.2, 0.2); // Herunterskalieren für AR
          this.add(this.pyramidGroup);
          this.pyramidGroup.add(this.taskObjects); // Hier kommen Pfeile/Schatten rein

          this.buildPyramidGeometry();
          this.createUI();
          this.updateTaskState(); // Initiale Aufgabe laden
        }

        buildPyramidGeometry() {
          const material = new THREE.LineBasicMaterial({ color: 0x4796e3, linewidth: 2 });
          const baseMaterial = new THREE.LineDashedMaterial({ color: 0x999999, dashSize: 0.2, gapSize: 0.1 });
          
          // Grundfläche zeichnen (A -> B -> C -> D -> A)
          const basePoints = [this.points.A, this.points.B, this.points.C, this.points.D, this.points.A];
          const baseGeo = new THREE.BufferGeometry().setFromPoints(basePoints);
          const baseLine = new THREE.Line(baseGeo, material);
          this.pyramidGroup.add(baseLine);

          // Kanten zur Spitze zeichnen (A->S, B->S, C->S, D->S)
          const edges = [this.points.A, this.points.B, this.points.C, this.points.D];
          edges.forEach(point => {
            const edgeGeo = new THREE.BufferGeometry().setFromPoints([point, this.points.S]);
            this.pyramidGroup.add(new THREE.Line(edgeGeo, material));
          });

          // Knotenpunkte (Kugeln) und Beschriftungen hinzufügen
          Object.entries(this.points).forEach(([name, pos]) => {
            if(name === 'L') return; // Lichtquelle kommt später
            
            const sphereGeom = new THREE.SphereGeometry(0.1, 16, 16);
            const sphereMat = new THREE.MeshPhongMaterial({ color: 0xca6673 });
            const sphere = new THREE.Mesh(sphereGeom, sphereMat);
            sphere.position.copy(pos);
            this.pyramidGroup.add(sphere);

            // Troika Text für die Beschriftung (A, B, C, D, S)
            const label = new Text();
            label.text = name;
            label.fontSize = 0.5;
            label.color = 0xffffff;
            label.position.copy(pos).add(new THREE.Vector3(0.2, 0.2, 0));
            label.sync();
            this.pyramidGroup.add(label);
            
            this.labels.push({ obj: label, name: name, pos: pos });
          });
        }

        createUI() {
          const boardColor = '#2b3a2f'; // Dunkles Tafelgrün
          const chalkWhite = '#f8f9fa';
          const chalkYellow = '#fcd34d';
          const woodColor = '#5c4033'; // Holzrahmen

          const card = this.uiCore.createCard({
            name: 'MathBoard',
            sizeX: 1.5,
            sizeY: 1.2,
            position: new THREE.Vector3(0, 1.8, -2.2),
            behaviors: [
              new ManipulationBehavior({
                draggable: true,
                manipulationMargin: 100,
                manipulationCornerRadius: 20,
              }),
            ],
          });

          // Haupt-Panel der Tafel (Holzrahmen)
          this.mainPanel = new UIPanel({
            width: '100%',
            height: '100%',
            fillColor: boardColor,
            strokeWidth: 16,
            strokeColor: woodColor,
            cornerRadius: 15,
            padding: 40,
            flexDirection: 'column',
            justifyContent: 'flex-start',
            alignItems: 'center',
            gap: 20,
          });
          card.add(this.mainPanel);

          // Titel
          this.mainPanel.add(new UIText('Vektorgeometrie: Pyramide', {
            fontSize: 60, fontWeight: 'bold', color: chalkWhite
          }));

          // Aufgaben-Beschreibung (verändert sich je nach Task)
          this.taskDescText = new UIText('Wähle ein Thema aus, um es im Raum zu erkunden.', {
            fontSize: 36, color: chalkWhite, textAlign: 'center', width: '90%', flexShrink: 1
          });
          this.mainPanel.add(this.taskDescText);

          // Hinweis-Box (versteckt/sichtbar)
          this.hintPanel = new UIPanel({
            width: '90%', padding: 20, cornerRadius: 10, fillColor: 'rgba(255,255,255,0.1)',
            flexDirection: 'column', alignItems: 'center', display: 'none'
          });
          this.hintText = new UIText('', { fontSize: 30, color: chalkYellow, textAlign: 'center' });
          this.hintPanel.add(this.hintText);
          this.mainPanel.add(this.hintPanel);

          const topicPanel = new UIPanel({
            flexDirection: 'row', gap: 20, width: '100%', height: 80, justifyContent: 'center'
          });
          
          const createBtn = (label, taskIndex) => {
            const btn = new UIPanel({
              width: 220, height: 70, cornerRadius: 10, fillColor: woodColor,
              justifyContent: 'center', alignItems: 'center',
              onClick: () => {
                this.currentTask = taskIndex;
                this.showHint = false; // Hint bei Wechsel ausblenden
                this.updateTaskState();
              }
            });
            btn.add(new UIText(label, { fontSize: 32, color: chalkWhite }));
            return btn;
          };

          topicPanel.add(createBtn('1. Kanten', 1));
          topicPanel.add(createBtn('2. Diagonalen', 2));
          topicPanel.add(createBtn('3. Schatten', 3));
          this.mainPanel.add(topicPanel);

          const actionPanel = new UIPanel({
            flexDirection: 'row', gap: 40, width: '100%', height: 80, justifyContent: 'center',
            marginTop: 'auto' // Drückt die Buttons nach unten
          });

          // Koordinaten-Toggle
          this.coordBtn = new UIPanel({
            width: 300, height: 70, cornerRadius: 35, fillColor: 'rgba(255,255,255,0.2)',
            strokeWidth: 4, strokeColor: chalkWhite,
            justifyContent: 'center', alignItems: 'center',
            onClick: () => {
              this.showCoordinates = !this.showCoordinates;
              this.updateTaskState();
            }
          });
          this.coordBtnText = new UIText('Koordinaten: Aus', { fontSize: 28, color: chalkWhite });
          this.coordBtn.add(this.coordBtnText);
          actionPanel.add(this.coordBtn);

          // Tipp-Toggle
          this.hintBtn = new UIPanel({
            width: 250, height: 70, cornerRadius: 35, fillColor: 'rgba(252, 211, 77, 0.3)',
            strokeWidth: 4, strokeColor: chalkYellow,
            justifyContent: 'center', alignItems: 'center',
            onClick: () => {
              this.showHint = !this.showHint;
              this.updateTaskState();
            }
          });
          this.hintBtnText = new UIText('Tipp anzeigen', { fontSize: 28, color: chalkYellow });
          this.hintBtn.add(this.hintBtnText);
          actionPanel.add(this.hintBtn);

          this.mainPanel.add(actionPanel);
        }

        updateTaskState() {
          // 1. Alte 3D-Zeichnungen aus Task-Layer entfernen
          while (this.taskObjects.children.length > 0) {
            const child = this.taskObjects.children[0];
            this.taskObjects.remove(child);
            if(child.geometry) child.geometry.dispose();
          }

          // 2. Texte und Koordinaten aktualisieren
          this.coordBtnText.text = this.showCoordinates ? 'Koordinaten: An' : 'Koordinaten: Aus';
          this.labels.forEach(l => {
            if (this.showCoordinates) {
              l.obj.text = `${l.name}(${l.pos.x}|${l.pos.y}|${l.pos.z})`;
            } else {
              l.obj.text = l.name;
            }
            l.obj.sync();
          });

          // 3. Aufgabenspezifische Inhalte generieren
          if (this.currentTask === 1) {
            this.taskDescText.text = "Thema 1: Kantenvektoren\nEin Vektor beschreibt die Verschiebung von einem Punkt zum anderen. Berechne den Vektor von A zur Spitze S.";
            this.hintText.text = "Tipp:\nNutze die 'Spitze minus Fuß'-Regel:\nVektor AS = S - A";
            
            // Pfeil von A nach S zeichnen
            const dir = new THREE.Vector3().subVectors(this.points.S, this.points.A);
            const length = dir.length();
            dir.normalize();
            const arrow = new THREE.ArrowHelper(dir, this.points.A, length, 0xfcd34d, 0.4, 0.2);
            this.taskObjects.add(arrow);

          } else if (this.currentTask === 2) {
            this.taskDescText.text = "Thema 2: Mittelpunkt der Grundfläche\nDie Diagonalen der quadratischen Grundfläche schneiden sich im Mittelpunkt M.";
            this.hintText.text = "Tipp:\nM ist der Mittelpunkt der Strecke AC (oder BD).\nM = 0.5 * (A + C)";

            // Diagonalen zeichnen
            const matDash = new THREE.LineDashedMaterial({ color: 0x93c5fd, dashSize: 0.2, gapSize: 0.1 });
            const geo1 = new THREE.BufferGeometry().setFromPoints([this.points.A, this.points.C]);
            const geo2 = new THREE.BufferGeometry().setFromPoints([this.points.B, this.points.D]);
            const line1 = new THREE.Line(geo1, matDash);
            const line2 = new THREE.Line(geo2, matDash);
            line1.computeLineDistances();
            line2.computeLineDistances();
            this.taskObjects.add(line1, line2);

            // Mittelpunkt markieren
            const M = new THREE.Vector3().addVectors(this.points.A, this.points.C).multiplyScalar(0.5);
            const mGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const mMesh = new THREE.Mesh(mGeo, new THREE.MeshPhongMaterial({ color: 0x93c5fd }));
            mMesh.position.copy(M);
            this.taskObjects.add(mMesh);
            
            const mLabel = new Text();
            mLabel.text = this.showCoordinates ? `M(${M.x}|${M.y}|${M.z})` : 'M';
            mLabel.fontSize = 0.5;
            mLabel.color = 0x93c5fd;
            mLabel.position.copy(M).add(new THREE.Vector3(0.2, 0.2, 0));
            mLabel.sync();
            this.taskObjects.add(mLabel);

          } else if (this.currentTask === 3) {
            this.taskDescText.text = "Thema 3: Schattenwurf\nEine Lichtquelle L strahlt auf die Pyramide. Wo trifft der Schatten der Spitze (S') auf den Boden (Ebene y=0)?";
            this.hintText.text = "Tipp:\nStelle die Geradengleichung g: x = L + t * LS auf.\nSetze die y-Koordinate der Geraden gleich 0.";

            // Lichtquelle
            const L = this.points.L;
            const lGeo = new THREE.SphereGeometry(0.2, 16, 16);
            const lMesh = new THREE.Mesh(lGeo, new THREE.MeshBasicMaterial({ color: 0xfcd34d }));
            lMesh.position.copy(L);
            this.taskObjects.add(lMesh);

            // Lichtstrahl L -> S -> Boden
            const dirLS = new THREE.Vector3().subVectors(this.points.S, L);
            // Schnittpunkt mit Boden (y=0): L.y + t * dirLS.y = 0  => t = -L.y / dirLS.y
            const t = -L.y / dirLS.y;
            const S_prime = new THREE.Vector3().copy(L).add(dirLS.clone().multiplyScalar(t));

            // Strahl zeichnen
            const rayGeo = new THREE.BufferGeometry().setFromPoints([L, S_prime]);
            const rayLine = new THREE.Line(rayGeo, new THREE.LineBasicMaterial({ color: 0xfcd34d }));
            this.taskObjects.add(rayLine);

            // Schattenpunkt S' markieren
            const spGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const spMesh = new THREE.Mesh(spGeo, new THREE.MeshBasicMaterial({ color: 0x555555 }));
            spMesh.position.copy(S_prime);
            this.taskObjects.add(spMesh);

            const spLabel = new Text();
            spLabel.text = this.showCoordinates ? `S'(${S_prime.x.toFixed(1)}|0|${S_prime.z.toFixed(1)})` : "S'";
            spLabel.fontSize = 0.5;
            spLabel.color = 0xfcd34d;
            spLabel.position.copy(S_prime).add(new THREE.Vector3(0.2, 0.2, 0));
            spLabel.sync();
            this.taskObjects.add(spLabel);

            // Schattenfläche zeichnen (A-B-C-D-S') - Zur Vereinfachung verbinden wir S' mit den Basisecken
            const shadowMat = new THREE.LineBasicMaterial({ color: 0x555555 });
            const corners = [this.points.A, this.points.B, this.points.C, this.points.D];
            corners.forEach(p => {
              const sGeo = new THREE.BufferGeometry().setFromPoints([p, S_prime]);
              this.taskObjects.add(new THREE.Line(sGeo, shadowMat));
            });
          } else {
            // Task 0: Keine Auswahl
            this.taskDescText.text = "Wähle ein Thema aus, um es im Raum zu erkunden.";
          }

          // UI Sichtbarkeiten für Hinweise anpassen
          this.hintPanel.display = (this.showHint && this.currentTask > 0) ? 'flex' : 'none';
          this.hintBtnText.text = this.showHint ? 'Tipp ausblenden' : 'Tipp anzeigen';
        }

        update() {
          const camera = xb.core.camera;
          // Basis-Labels drehen
          this.labels.forEach(l => {
            l.obj.quaternion.copy(camera.quaternion);
          });
          // Task-Labels (wie M oder S') drehen
          this.taskObjects.children.forEach(child => {
            if (child.isText) {
              child.quaternion.copy(camera.quaternion);
            }
          });
        }
      }

      document.addEventListener('DOMContentLoaded', async function () {
        const options = new xb.Options();
        options.enableUI(); // UIKit aktivieren
        options.uikit.enable(uikit);
        options.setAppTitle('Vektorgeometrie im AR');
        
        // Fügt unser Skript zur XR Blocks Engine hinzu
        xb.add(new PyramidMathApplet());
        
        // Initialisiert die Anwendung
        await xb.init(options);
      });
    </script>
  </body>
</html>
